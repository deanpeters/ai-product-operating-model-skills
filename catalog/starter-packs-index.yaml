- id: team-lead-workflow
  version: 0.1.0
  title: Team Lead — Redesign an AI-Assisted Workflow
  persona: Team Lead
  description: Observe one recurring product-team motion, redesign human and AI responsibilities,
    run a bounded pilot, and make an evidence-based adoption decision.
  decision: How should this recurring decision cycle change, what must remain human,
    and should the tested redesign be adopted, revised, contained, or stopped?
  result: An observed baseline, explicit human-AI work design, bounded pilot result,
    and adopt, revise, contain, or stop decision with ownership and review triggers.
  manifest: starter-packs/manifests/team-lead-workflow.yaml
  primary_skills:
