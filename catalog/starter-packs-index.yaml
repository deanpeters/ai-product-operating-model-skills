- id: product-operations-assessment
  version: 0.1.0
  title: Product Operations — Establish an Operating-Model Baseline
  persona: Product Operations
  description: Assess how the organization chooses, builds, evaluates, governs, and
    learns from AI product work, then turn the most consequential conditions into
    an owned roadmap.
  decision: Which operating-model conditions need attention first, who owns the next
    motion, and what evidence should change the roadmap?
  result: An evidence-based operating-model profile and sequenced improvement roadmap
    with critical gaps, owners, evidence milestones, and review triggers.
  manifest: starter-packs/manifests/product-operations-assessment.yaml
