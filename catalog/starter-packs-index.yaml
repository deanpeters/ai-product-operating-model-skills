- id: product-manager-initiative
  version: 0.1.0
  title: Product Manager — Evaluate an AI Initiative
  persona: Product Manager
  description: Move an AI opportunity from problem evidence through value, readiness,
    authority, and a bounded proceed, constrain, remediate, pause, or stop recommendation.
  decision: Should this initiative proceed at the proposed scope and consequence,
    and under what evidence conditions, constraints, ownership, expiry, and review
    trigger?
  result: A scoped proceed, proceed-with-constraints, remediate-and-re-review, pause,
    or stop recommendation with evidence, owners, expiry, and the next review trigger.
