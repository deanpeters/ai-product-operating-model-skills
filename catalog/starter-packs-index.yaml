starter_packs:
- id: head-of-product-direction
  version: 0.1.0
  title: Head of Product — Set AI Product Direction
  persona: Head of Product
  description: Turn broad or fragmented AI ambition into evidence-aware product choices,
    non-goals, portfolio implications, and owned first commitments.
  decision: Where should AI contribute to product strategy now, what will the organization
    avoid, and which learning, investment, containment, or stop motions happen next?
  result: An evidence-aware AI product thesis with explicit choices, non-goals, portfolio
    implications, first commitments and constraints, owners, and a dated review trigger.
  manifest: starter-packs/manifests/head-of-product-direction.yaml
  primary_skills:
  - aipom-portfolio-posture-advisor
  - aipom-strategy-thesis-advisor
  dependency_skills: []
  resolved_skills:
  - aipom-portfolio-posture-advisor
  - aipom-strategy-thesis-advisor
- id: cto-technical-readiness
  version: 0.1.0
  title: CTO — Establish the AI Technical Readiness Bar
  persona: CTO
  description: Define consequence-aware technical evidence and operating conditions
    for AI launch, scale, material change, data use, dependency, and autonomy decisions.
  decision: What must be demonstrated about dependencies, context, data, evaluation,
    operation, and recovery before each class of AI product decision is technically
    supportable?
  result: A consequence-aware technical readiness bar with required evidence, critical
    gaps, owners, reviewers, exception and expiry rules, permitted interim motions,
    and review triggers.
  manifest: starter-packs/manifests/cto-technical-readiness.yaml
  primary_skills:
  - aipom-context-readiness-advisor
  - aipom-data-readiness-audit
  - aipom-evaluation-strategy-advisor
