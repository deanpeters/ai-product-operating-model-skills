- name: aipom-behavior-contract-builder
  description: Define expected, acceptable, and prohibited AI behavior with representative
    cases, thresholds, escalation, and consequences. Use before evaluation, launch,
    or autonomy decisions.
  type: component
  category: evaluation-and-evidence
  phase: 1
  status: active
  operating_level:
  - product-team
  - initiative
  audience:
  - Product Manager
  - Design
  - Engineering
  - Data
  - Research
  - AI Governance
  best_for:
  - Defining acceptable behavior before evaluation or launch
  - Resolving disagreement about what good enough means
  - Establishing limits before granting AI authority
  evidence_required:
  - Intended users, use cases, and affected people
  - Product outcomes and known failure consequences
  - Representative examples and constraints
  - Existing evaluation evidence where available
  produces:
  - AI behavior contract
  - Representative behavior cases
  - Escalation and decision thresholds
  assessment_questions:
  - EVAL-01
  - EVAL-02
  - EVAL-03
  - GOV-02
  maturity_move:
    from: emerging
    to: repeatable
  estimated_time: 45-75 min
  group_size: 3-8
  depends_on: []
  combine_with:
  - aipom-autonomy-boundary-designer
  - aipom-golden-dataset-builder
  - aipom-eval-scorecard-builder
  sources:
  - https://www.nist.gov/publications/artificial-intelligence-risk-management-framework-ai-rmf-10
  path: skills/aipom-behavior-contract-builder/SKILL.md
