  - VP Product
  - Product Operations
  - Finance
  - AI Governance
  best_for:
  - Turning an AIPOM assessment into action
  - Sequencing cross-category operating-model change
  - Aligning owners, evidence, dependencies, and review decisions
  evidence_required:
  - AIPOM assessment or equivalent evidence-based findings
  - Critical gaps and constrained decisions
  - Current initiatives, owners, capacity, and dependencies
  - Strategic priorities and change constraints
  produces:
