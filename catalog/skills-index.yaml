skills:
- name: aipom-capability-maturity-advisor
  description: Diagnose role capability, applied learning, workflow adoption, stewardship,
    and outcome evidence; recommend the next capability-building motion rather than
    more generic training.
  type: interactive
  category: capability-adoption-and-reuse
  phase: 1
  status: active
  operating_level:
  - organization
  - product-team
  audience:
  - CPO
  - CTO
  - Product Operations
  - Product Manager
  - Team Lead
  - Enablement
  - People Operations
  - AI Governance
  best_for:
  - Moving beyond AI literacy training
  - Diagnosing adoption without outcome evidence
  - Choosing a role-specific capability intervention
  evidence_required:
  - Role expectations and workflow needs
  - Applied work examples
  - Coaching and adoption evidence
  - Decision and outcome measures
  produces:
  - Capability maturity diagnosis
  - Role and workflow gap
  - Recommended learning or reuse motion
  assessment_questions:
  - CAP-01
  - CAP-02
  - CAP-03
  - CAP-04
  - CAP-05
  maturity_move:
    from: emerging
    to: repeatable
  estimated_time: 30-60 min
  group_size: 2-10
  depends_on: []
  combine_with:
  - role-based-aipom-competency-map
  - aipom-learning-system-designer
  - workflow-to-skill-converter
  sources: []
  path: skills/aipom-capability-maturity-advisor/SKILL.md
- name: workflow-to-skill-converter
  description: Convert a proven, improved workflow into a governed, reusable skill
    with context, decisions, examples, guardrails, evaluations, ownership, and maintenance
    rules.
  type: component
  category: capability-adoption-and-reuse
  phase: 1
  status: active
  operating_level:
  - organization
  - product-team
  audience:
  - Product Operations
  - Product Manager
  - Team Lead
  - Design
  - Engineering
  - Enablement
  best_for:
  - Bottling a workflow that works repeatedly
  - Turning local practice into inspectable organizational capability
  - Preparing a human and agent-readable facilitation method
  evidence_required:
  - Current and improved workflow evidence
  - Examples of repeated use and outcomes
  - Context, decisions, guardrails, and failure modes
  - Named steward and intended users
  produces:
  - Canonical reusable skill bundle
  - Evidence and readiness decision
  - Stewardship and improvement plan
  assessment_questions:
  - CAP-04
  - WFL-04
  - WFL-05
  - CTX-02
  maturity_move:
    from: emerging
    to: repeatable
  estimated_time: 60-120 min
  group_size: 2-6
  depends_on:
  - human-aipom-work-contract
  combine_with:
  - aipom-workflow-playbook-builder
  - aipom-adoption-impact-scorecard
  sources: []
  path: skills/workflow-to-skill-converter/SKILL.md
- name: aipom-context-package-builder
  description: Assemble a bounded, reusable context package with purpose, authoritative
    sources, constraints, decisions, examples, exclusions, and refresh rules. Use
    for recurring AI-assisted work.
  type: component
  category: context-knowledge-and-data
  phase: 1
  status: active
  operating_level:
  - organization
  - product-team
  - initiative
  audience:
  - Product Operations
  - Product Manager
  - Team Lead
  - Engineering
  - Data
  - Research
  - Knowledge Management
  best_for:
  - Grounding a recurring AI-assisted workflow
  - Reducing stale, conflicting, or excessive context
  - Creating an inspectable handoff across people and agents
  evidence_required:
  - Workflow purpose and decisions supported
  - Candidate source artifacts and owners
  - Constraints, terminology, examples, and prior decisions
  - Access, privacy, retention, and freshness requirements
  produces:
  - Bounded context package
  - Source and conflict ledger
  - Refresh, exclusion, and ownership rules
  assessment_questions:
  - CTX-01
  - CTX-02
  - CTX-04
  - CTX-05
  - WFL-04
  maturity_move:
    from: emerging
    to: repeatable
  estimated_time: 45-90 min
  group_size: 2-6
  depends_on: []
  combine_with:
  - authoritative-source-map
  - aipom-context-readiness-advisor
  - aipom-context-lifecycle-designer
