- name: aipom-operating-model-assessment
  description: Assess AI product operating-model maturity across seven categories
    using evidence, disagreement, and critical-gap logic. Use to identify consequential
    gaps and next interventions.
  type: workflow
  category: cross-category
  phase: 1
  status: active
  operating_level:
  - organization
  - portfolio
  - product-team
  audience:
  - CPO
  - CTO
  - VP Product
  - Product Operations
  - Product Manager
  - Design
  - Engineering
  - Data
  - Research
  - Legal
  - Privacy
  - Security
  - Risk
  - AI Governance
  best_for:
  - Establishing an evidence-based baseline before operating-model design
  - Identifying the weakest consequential organizational conditions
  - Comparing leadership intent with product-team and governance practice
  - Preparing an AI product operating-model roadmap
  evidence_required:
  - Existing strategy, portfolio, workflow, context, evaluation, governance, and capability
    artifacts
  - Examples showing whether documented practices are actually used
  - Decision records, evaluation results, adoption evidence, and outcome measures
    where available
  - Perspectives from leadership, practitioners, governance partners, and affected
    users where relevant
  produces:
  - Seven-category maturity profile
  - Evidence and confidence ledger
  - Disagreement and critical-gap report
  - Prioritized intervention recommendations
  - Named owners and next evidence-producing actions
  assessment_questions:
  - STR-01
  - STR-02
  - STR-03
  - STR-04
  - STR-05
  - POR-01
  - POR-02
  - POR-03
  - POR-04
  - POR-05
  - WFL-01
  - WFL-02
  - WFL-03
  - WFL-04
  - WFL-05
  - CTX-01
  - CTX-02
  - CTX-03
  - CTX-04
  - CTX-05
  - EVAL-01
  - EVAL-02
  - EVAL-03
  - EVAL-04
  - EVAL-05
  - GOV-01
  - GOV-02
  - GOV-03
  - GOV-04
  - GOV-05
  - CAP-01
  - CAP-02
  - CAP-03
  - CAP-04
  - CAP-05
  maturity_move:
    from: absent
    to: emerging
  estimated_time: 2-4 hours across one or more sessions
  group_size: 4-20
  depends_on: []
  combine_with:
  - aipom-operating-model-roadmap
  - aipom-strategy-thesis-advisor
  - aipom-portfolio-posture-advisor
  - aipom-workflow-opportunity-advisor
  - aipom-context-readiness-advisor
  - aipom-evaluation-strategy-advisor
  - responsible-aipom-governance-advisor
  - aipom-capability-maturity-advisor
  sources:
  - https://www.nist.gov/publications/artificial-intelligence-risk-management-framework-ai-rmf-10
  - https://oecd.ai/en/accountability/
  path: skills/aipom-operating-model-assessment/SKILL.md
- name: aipom-operating-model-roadmap
  description: Convert evidence-based operating-model findings into an owned 30-,
    90-, 180-, and 365-day sequence of interventions, learning milestones, dependencies,
    and decisions.
